services:
  postgres:
    image: postgres:16-alpine
    container_name: skillr_course_postgres
    env_file:
      - .env.docker
    ports:
      - "5435:5432"
    volumes:
      - course_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  course:
    container_name: skillr_course_api
    build:
      context: ../..
      dockerfile: apps/course/dockerfile.course
    env_file:
      - .env.docker
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:latest
    container_name: skillr_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env.docker
    environment:
      MINIO_ROOT_USER: skillr
      MINIO_ROOT_PASSWORD: moragon2025!
    volumes:
      - minio_data:/data
    command: server --console-address ":9001" /data
    restart: unless-stopped

volumes:
  course_pg_data:
  course_minio_data: